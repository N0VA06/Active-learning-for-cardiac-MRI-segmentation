# ============================================================
#  Active Learning for ACDC Cardiac MRI Segmentation
#  Configuration File  –  v3 (early-exit uncertainty)
# ============================================================

paths:
  raw_data:         "data/raw/acdc"
  processed_images: "data/processed/images"
  processed_labels: "data/processed/labels"
  splits_dir:       "data/splits"
  labeled_pool:     "data/splits/labeled_pool.json"
  unlabeled_pool:   "data/splits/unlabeled_pool.json"
  output_models:    "outputs/models"
  output_preds:     "outputs/predictions"
  output_plots:     "outputs/plots"
  output_logs:      "outputs/logs"

preprocessing:
  target_spacing:   [1.25, 1.25, 10.0]
  spatial_size:     [160, 160]
  norm_method:      "zscore"

# ── Model  ────────────────────────────────────────────────────
model:
  architecture:     "attention_unet"
  in_channels:      1
  out_channels:     4                      # BG=0, RV=1, MYO=2, LV=3
  channels:         [32, 64, 128, 256, 320]
  strides:          [2, 2, 2, 2]
  num_res_units:    3
  dropout_prob:     0.15

# ── Training  ─────────────────────────────────────────────────
training:
  epochs:           50
  batch_size:       8
  lr:               3.0e-4
  lr_min:           1.0e-6
  warmup_epochs:    5
  weight_decay:     1.0e-4
  grad_clip:        1.0
  amp:              true
  num_workers:      4
  val_fraction:     0.2
  seed:             42

# ── Loss  ─────────────────────────────────────────────────────
loss:
  type:             "dice_focal"
  dice_weight:      0.6
  focal_weight:     0.4
  focal_gamma:      2.0
  tversky_alpha:    0.3
  tversky_beta:     0.7
  class_weights:    [0.1, 1.0, 1.0, 1.0]

# ── Early Exit  ───────────────────────────────────────────────
# Exit heads are attached to intermediate decoder ConvTranspose2d layers.
#
# exit_indices (sorted deepest → shallowest):
#   0 = deepest decoder  (ct out_ch=256, ~20×20)
#   1 = middle-deep      (ct out_ch=128, ~40×40)  ← hooked
#   2 = middle-shallow   (ct out_ch=64,  ~80×80)  ← hooked
#   3 = shallowest       (ct out_ch=32,  ~160×160)
#
# aux_loss_weight: λ for auxiliary exit losses during training
#   L_total = L_final + λ*(L_exit1 + L_exit2)
#   0.3 is a good default; lower (0.1) if exit heads hurt main Dice
#
# alpha / beta: weights for the combined uncertainty score
#   U_combined = α·U_mc_dropout + β·U_exit_disagreement
#   Sum need not equal 1; both are min-max normalised first
early_exit:
  enabled:          true
  exit_indices:     [1, 2]
  aux_loss_weight:  0.3
  alpha:            0.5                    # MC-Dropout weight
  beta:             0.5                    # exit-disagreement weight

# ── Active Learning  ──────────────────────────────────────────
active_learning:
  initial_labeled:  10
  query_size:       8
  num_cycles:       8
  mc_samples:       20
  uncertainty:      "add"                   

evaluation:
  include_background:    false
  hausdorff_percentile:  95
