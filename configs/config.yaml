paths:
  raw_data:         "data/raw/acdc"
  processed_images: "data/processed/images"
  processed_labels: "data/processed/labels"
  splits_dir:       "data/splits"
  labeled_pool:     "data/splits/labeled_pool.json"
  unlabeled_pool:   "data/splits/unlabeled_pool.json"
  output_models:    "outputs/models"
  output_preds:     "outputs/predictions"
  output_plots:     "outputs/plots"
  output_logs:      "outputs/logs"

preprocessing:
  target_spacing:   [1.25, 1.25, 10.0]
  spatial_size:     [160, 160]
  norm_method:      "zscore"

# ── Model  ────────────────────────────────────────────────────
# AttentionUNet with wider channels + deeper residual units
model:
  architecture:     "attention_unet"       # attention_unet | unet
  in_channels:      1
  out_channels:     4                      # BG=0, RV=1, MYO=2, LV=3
  channels:         [32, 64, 128, 256, 320]
  strides:          [2, 2, 2, 2]
  num_res_units:    3                      # was 2
  dropout_prob:     0.15                   # slightly lower for stable training

# ── Training  ─────────────────────────────────────────────────
training:
  epochs:           50                     # was 30
  batch_size:       8
  lr:               3.0e-4                 # higher start; cosine decays to lr_min
  lr_min:           1.0e-6
  warmup_epochs:    5                      # linear LR warmup
  weight_decay:     1.0e-4
  grad_clip:        1.0                    # gradient clipping max-norm
  amp:              true                   # mixed precision (RTX 4060 supports bf16/fp16)
  num_workers:      4
  val_fraction:     0.2
  seed:             42

# ── Loss  ─────────────────────────────────────────────────────
# Tversky-focal dice penalises FN harder (good for small structures)
loss:
  type:             "dice_focal"           # dice_focal | dice_ce
  dice_weight:      0.6
  focal_weight:     0.4
  focal_gamma:      2.0                    # focal exponent
  tversky_alpha:    0.3                    # FP weight  (0.5=Dice, <0.5=penalise FP more)
  tversky_beta:     0.7                    # FN weight  (>0.5=penalise FN more)
  class_weights:    [0.1, 1.0, 1.0, 1.0]  # down-weight BG, equal for structures

# ── Active Learning  ──────────────────────────────────────────
active_learning:
  initial_labeled:  10
  query_size:       8
  num_cycles:       8
  mc_samples:       20
  uncertainty:      "entropy"

# ── Evaluation  ───────────────────────────────────────────────
evaluation:
  include_background:    false
  hausdorff_percentile:  95
